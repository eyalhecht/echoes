name: Deploy to Firebase Hosting on Master Merge

on:
  push:
    branches:
      - master

jobs:
  build_and_deploy_dev:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          VITE_MAPS_API_KEY: ${{ secrets.VITE_MAPS_API_KEY }}
          VITE_API_KEY: ${{ secrets.VITE_API_KEY_DEV }}
          VITE_AUTH_DOMAIN: ${{ secrets.VITE_AUTH_DOMAIN_DEV }}
          VITE_PROJECT_ID: ${{ secrets.VITE_PROJECT_ID_DEV }}
          VITE_STORAGE_BUCKET: ${{ secrets.VITE_STORAGE_BUCKET_DEV }}
          VITE_MESSAGING_SENDER_ID: ${{ secrets.VITE_MESSAGING_SENDER_ID_DEV }}
          VITE_APP_ID: ${{ secrets.VITE_APP_ID_DEV }}

      - name: Deploy to Firebase Hosting - Dev
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY_DEV }}
          projectId: echoes-677
          channelId: live
