name: Deploy to Production Firebase Hosting

on:
  workflow_dispatch:

jobs:
  build_and_deploy_prod:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          VITE_MAPS_API_KEY: ${{ secrets.VITE_MAPS_API_KEY }}
          VITE_API_KEY: ${{ secrets.VITE_API_KEY_PROD }}
          VITE_AUTH_DOMAIN: ${{ secrets.VITE_AUTH_DOMAIN_PROD }}
          VITE_PROJECT_ID: ${{ secrets.VITE_PROJECT_ID_PROD }}
          VITE_STORAGE_BUCKET: ${{ secrets.VITE_STORAGE_BUCKET_PROD }}
          VITE_MESSAGING_SENDER_ID: ${{ secrets.VITE_MESSAGING_SENDER_ID_PROD }}
          VITE_APP_ID: ${{ secrets.VITE_APP_ID_PROD }}

      - name: Deploy to Firebase Hosting - Production
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY_PROD }}
          projectId: echoes-prod-2afe6
          channelId: live
